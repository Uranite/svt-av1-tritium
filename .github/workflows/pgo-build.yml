name: pgo-build
on:
  workflow_dispatch:
  push:
    branches:
      - pgo-test
  
jobs:
  build-windows-x86-64:
    runs-on: "windows-latest"
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        fetch-tags: true

    - uses: Akatmks/build-svt-av1@ffms2-test-win
      with:
        pgo-video: "FoodMarket2"
        pgo-parameters: "--crf 20.00 --tune 0 --film-grain 8 --enable-dlf 2"
        ffms2: "ffms2"

    - id: detect-icelake-server-znver5
      run: ls BuildAction/icelake-server+znver5/static/SvtAv1EncApp.exe
      continue-on-error: true
    - run: cd BuildAction/icelake-server+znver5/static && tar cJf Windows_x86-64_icelake-server+znver5.tar.xz SvtAv1EncApp.exe
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}
    - uses: actions/upload-artifact@v4
      with:
        name: Windows_x86-64_icelake-server-znver5
        path: BuildAction/icelake-server+znver5/static/Windows_x86-64_icelake-server+znver5.tar.xz
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}

    - id: detect-znver2
      run: ls BuildAction/znver2/static/SvtAv1EncApp.exe
      continue-on-error: true
    - run: cd BuildAction/znver2/static && tar cJf Windows_x86-64_znver2.tar.xz SvtAv1EncApp.exe
      if: ${{ steps.detect-znver2.outcome != 'failure' }}
    - uses: actions/upload-artifact@v4
      with:
        name: Windows_x86-64_znver2
        path: BuildAction/znver2/static/Windows_x86-64_znver2.tar.xz
      if: ${{ steps.detect-znver2.outcome != 'failure' }}

    - run: ls BuildAction/x86-64-v3+znver2/static/SvtAv1EncApp.exe
    - run: cd BuildAction/x86-64-v3+znver2/static && tar cJf Windows_x86-64_x86-64-v3+znver2.tar.xz SvtAv1EncApp.exe
    - uses: actions/upload-artifact@v4
      with:
        name: Windows_x86-64_x86-64-v3-znver2
        path: BuildAction/x86-64-v3+znver2/static/Windows_x86-64_x86-64-v3+znver2.tar.xz


  build-windows-arm64:
    runs-on: "windows-11-arm"
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        fetch-tags: true

    - uses: Akatmks/build-svt-av1@ffms2-test-win
      with:
        pgo-video: "FoodMarket2"
        pgo-parameters: "--crf 20.00 --tune 0 --film-grain 8 --enable-dlf 2"
        ffms2: "ffms2"

    - run: ls BuildAction/armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1/static/SvtAv1EncApp.exe
    - run: cd BuildAction/armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1/static && tar cJf Windows_arm64_armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1.tar.xz SvtAv1EncApp.exe
    - uses: actions/upload-artifact@v4
      with:
        name: Windows_arm64_armv8.7-a-crypto-sm4-sha3-fp16-sve-sve2-oryon-1
        path: BuildAction/armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1/static/Windows_arm64_armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1.tar.xz


  build-linux-x86-64:
    runs-on: "ubuntu-latest"
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        fetch-tags: true

    - uses: Akatmks/build-svt-av1@ffms2-test-win
      with:
        pgo-video: "FoodMarket2"
        pgo-parameters: "--crf 20.00 --tune 0 --film-grain 8 --enable-dlf 2"
        ffms2: "ffms2"

    - id: detect-icelake-server-znver5
      run: ls BuildAction/icelake-server+znver5/static/SvtAv1EncApp
      continue-on-error: true
    - run: cd BuildAction/icelake-server+znver5/static && tar cJf Linux_x86-64_icelake-server+znver5.tar.xz SvtAv1EncApp
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}
    - uses: actions/upload-artifact@v4
      with:
        name: Linux_x86-64_icelake-server-znver5
        path: BuildAction/icelake-server+znver5/static/Linux_x86-64_icelake-server+znver5.tar.xz
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}

    - id: detect-znver2
      run: ls BuildAction/znver2/static/SvtAv1EncApp
      continue-on-error: true
    - run: cd BuildAction/znver2/static && tar cJf Linux_x86-64_znver2.tar.xz SvtAv1EncApp
      if: ${{ steps.detect-znver2.outcome != 'failure' }}
    - uses: actions/upload-artifact@v4
      with:
        name: Linux_x86-64_znver2
        path: BuildAction/znver2/static/Linux_x86-64_znver2.tar.xz
      if: ${{ steps.detect-znver2.outcome != 'failure' }}

    - run: ls BuildAction/x86-64-v3+znver2/static/SvtAv1EncApp
    - run: cd BuildAction/x86-64-v3+znver2/static && tar cJf Linux_x86-64_x86-64-v3+znver2.tar.xz SvtAv1EncApp
    - uses: actions/upload-artifact@v4
      with:
        name: Linux_x86-64_x86-64-v3-znver2
        path: BuildAction/x86-64-v3+znver2/static/Linux_x86-64_x86-64-v3+znver2.tar.xz


  build-macos-arm64:
    runs-on: "macos-latest"
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        fetch-tags: true

    - uses: Akatmks/build-svt-av1@ffms2-test-win
      with:
        pgo-video: "FoodMarket2"
        pgo-parameters: "--crf 20.00 --tune 0 --film-grain 8 --enable-dlf 2"
        ffms2: "ffms2"

    - run: ls BuildAction/armv8.5-a+simd+crypto+apple-m3/static/SvtAv1EncApp
    - run: cd BuildAction/armv8.5-a+simd+crypto+apple-m3/static && tar cJf macOS_arm64_armv8.5-a+simd+crypto+apple-m3.tar.xz SvtAv1EncApp
    - uses: actions/upload-artifact@v4
      with:
        name: macOS_arm64_armv8.5-a-simd-crypto-apple-m3
        path: BuildAction/armv8.5-a+simd+crypto+apple-m3/static/macOS_arm64_armv8.5-a+simd+crypto+apple-m3.tar.xz


  build-macos-x86-64:
    runs-on: "macos-26-intel"
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        fetch-tags: true

    - uses: Akatmks/build-svt-av1@ffms2-test-win
      with:
        pgo-video: "FoodMarket2"
        pgo-parameters: "--crf 20.00 --tune 0 --film-grain 8 --enable-dlf 2"
        ffms2: "ffms2"

    - run: ls BuildAction/skylake/static/SvtAv1EncApp
    - run: cd BuildAction/skylake/static && tar cJf macOS_x86-64_skylake.tar.xz SvtAv1EncApp
    - uses: actions/upload-artifact@v4
      with:
        name: macOS_x86-64_skylake
        path: BuildAction/skylake/static/macOS_x86-64_skylake.tar.xz
