name: pgo-build
# on: workflow_dispatch
on: push # testing only

jobs:
  tag:
    runs-on: "ubuntu-latest"
    outputs:
      tag: ${{ steps.generate-tag.outputs.tag }}
      name: ${{ steps.generate-name.outputs.name }}
    steps:
    - uses: actions/checkout@v7
    - id: generate-tag
      run: echo tag=pgo-build-$(git log -1 "--date=format:%F" "--format=%ad-%h") >> "$GITHUB_OUTPUT"
    - id: generate-name
      run: echo name=$(git log -1 "--date=format:%F" "--format=%ad %h") >> "$GITHUB_OUTPUT"


  release:
    needs: tag
    runs-on: "ubuntu-latest"
    steps:
    - uses: actions/checkout@v7
      with:
        ref: "refs/heads/pgo-build-tags"
    - run: GH_TOKEN=${{ github.token }} gh release delete ${{ needs.tag.outputs.tag }} --cleanup-tag
      continue-on-error: true
    - run: git config user.email Akatsumekusa@protonmail.com && git config user.name "Akatsumekusa"
    - run: git fetch --depth=1 origin ${{ github.ref }}
    - run: git restore -s ${{ github.sha }} . && git add --all && git commit --allow-empty -m ${{ needs.tag.outputs.tag }} && git push origin pgo-build-tags
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        target_commitish: pgo-build-tags
        name: SVT-AV1-Tritium ${{ needs.tag.outputs.name }}
        body: |
          Ref `${{ github.ref }}` | Commit `${{ github.sha }}` | Dolby Vision & HDR10+ | FFMS2 (*)  
          Windows | x86-64 | LLVM Project Clang LLD | winthread | `icelake-server` + `znver5` | LTO PGO  
          Windows | x86-64 | LLVM Project Clang LLD | winthread | `znver2` | LTO PGO  
          Windows | x86-64 | LLVM Project Clang LLD | winthread | `x86-64-v3` + `znver2` | LTO PGO  
          Windows | arm64 | LLVM Project Clang LLD | winthread | `armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2` + `oryon-1` | LTO PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `icelake-server` + `znver5` | LTO PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `znver2` | LTO PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `x86-64-v3` + `znver2` | LTO PGO  
          macOS | arm64 | LLVM Project Clang LLD | `armv8.5-a+simd+crypto` + `apple-m3` | LTO PGO  
          macOS | x86-64 | LLVM Project Clang LLD | `skylake` | LTO PGO  

          On x86-64 systems, no matter if you're on an Intel or AMD system, you should try these builds in the order of `icelake-server` + `znver5` ⇒ `znver2` ⇒ `x86-64-v3` + `znver2`.  
          If your CPU doesn't support the features required by the `icelake-server` + `znver5` version, often indicated by crashing outright when attempting to make any encodes, you can try the `znver2` version and see if that works. If not, then the `x86-64-v3` + `znver2` version, which should always work on any modern systems.  
          Some versions might not be available if the GitHub Actions runners we get this time don't support the respective features.  

          On Windows x86-64, FFMS2 is supported and comes with the binary. On Windows arm64, FFMS2 is currently not available.  
          On Linux and macOS, both binaries built with and without FFMS2 is available. To use the FFMS2 version, you need to install `ffms2` from your system package manager.  

          Thanks to studies and contributions from afed, Emre, Ironclad, Itachi Uchiha, Khaoklong, Miss Ashenlight, Soda, SwareJonge, Trix, Yiss, and other people in the community for discovering the method to build the fastest binary.  
        prerelease: false
        make_latest: "true"


  build-windows-x86-64:
    needs: [tag, release]
    runs-on: "windows-latest"
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        fetch-tags: true

    - uses: Akatmks/build-svt-av1@ffms2-test-win
      with:
        pgo-video: "FoodMarket2"
        pgo-parameters: "--crf 20.00 --tune 0 --film-grain 8 --enable-dlf 2"
        ffms2: "false"

    - id: detect-icelake-server-znver5
      run: ls BuildAction/icelake-server+znver5/static/ffms2/SvtAv1EncApp.exe
      continue-on-error: true
    - run: cd BuildAction/icelake-server+znver5/static/ffms2 && tar cJf Windows_x86-64_ffms2_icelake-server+znver5.tar.xz SvtAv1EncApp.exe
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/icelake-server+znver5/static/ffms2/Windows_x86-64_ffms2_icelake-server+znver5.tar.xz
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}

    - id: detect-znver2
      run: ls BuildAction/znver2/static/ffms2/SvtAv1EncApp.exe
      continue-on-error: true
    - run: cd BuildAction/znver2/static/ffms2 && tar cJf Windows_x86-64_ffms2_znver2.tar.xz SvtAv1EncApp.exe
      if: ${{ steps.detect-znver2.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/znver2/static/ffms2/Windows_x86-64_ffms2_znver2.tar.xz
      if: ${{ steps.detect-znver2.outcome != 'failure' }}

    - run: ls BuildAction/x86-64-v3+znver2/static/ffms2/SvtAv1EncApp.exe
    - run: cd BuildAction/x86-64-v3+znver2/static/ffms2 && tar cJf Windows_x86-64_ffms2_x86-64-v3+znver2.tar.xz SvtAv1EncApp.exe
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/x86-64-v3+znver2/static/ffms2/Windows_x86-64_ffms2_x86-64-v3+znver2.tar.xz


